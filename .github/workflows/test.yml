name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # The benchmark contenders (oj, yajl-ruby, rapidjson, fast_jsonparser)
  # are C extensions with no bearing on the suite; skipping them keeps
  # the matrix fast and Windows-safe.
  BUNDLE_WITHOUT: benchmark

jobs:
  test:
    name: Ruby ${{ matrix.ruby }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        ruby: ["3.3", "3.4", "4.0"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby & Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          cargo-cache: true

      - name: Compile native extension
        run: bundle exec rake compile

      - name: Run specs
        run: bundle exec rake spec
