name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  BUNDLE_WITHOUT: benchmark

jobs:
  standardrb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - run: bundle exec rake standard

  rbs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - run: bundle exec rbs -I sig -r json validate
